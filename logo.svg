<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo preto (será transparente no uso) -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&display=swap');

      .logo-text-main {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 320px;
        font-weight: 800;
        fill: white;
        letter-spacing: -8px;
      }

      .logo-text-sub {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 70px;
        font-weight: 600;
        fill: #2B7FD6;
        letter-spacing: 2px;
      }

      .logo-accent {
        fill: #2B7FD6;
      }
    </style>
  </defs>

  <!-- Círculo de borda (azul premium) -->
  <circle cx="500" cy="500" r="480" fill="none" stroke="#2B7FD6" stroke-width="45"/>

  <!-- Círculo interno (azul profundo) -->
  <circle cx="500" cy="500" r="450" fill="none" stroke="#1A5BA8" stroke-width="2" opacity="0.3"/>

  <!-- Texto principal: To,Do -->
  <g>
    <!-- TO -->
    <text x="500" y="480" class="logo-text-main" text-anchor="middle">To</text>

    <!-- Acento azul (vírgula/ponto) -->
    <circle cx="570" cy="480" r="35" class="logo-accent"/>

    <!-- DO -->
    <text x="650" y="480" class="logo-text-main" text-anchor="start">Do</text>
  </g>

  <!-- Tagline: Automatize. Conecte. Evolua. -->
  <text x="500" y="620" class="logo-text-sub" text-anchor="middle">Automatize. Conecte. Evolua.</text>

  <!-- Elementos decorativos (linhas suaves) -->
  <g opacity="0.15">
    <!-- Linha superior esquerda -->
    <line x1="200" y1="180" x2="350" y2="250" stroke="#2B7FD6" stroke-width="3" stroke-linecap="round"/>

    <!-- Linha inferior direita -->
    <line x1="650" y1="750" x2="800" y2="820" stroke="#2B7FD6" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>